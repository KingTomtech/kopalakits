        - generic [ref=e54]:
          - paragraph [ref=e55]: Kopala Kits was born out of frustration. Quality football jerseys were hard to find in Zambia, and what you did find was expensive or fake. We set out to change that.
          - paragraph [ref=e56]:
            - strong [ref=e57]: "Note:"
            - text: photographs of kits in the Local and Retro sections are real; the four Zambian Super League kits (Nkana, Power, Mufulira, Kabwe) are illustrated placeholders that show the team's colours and badge area until we get on-pitch photos.
          - paragraph [ref=e58]: Today we stock local Zambian teams (Nkana, Power, Mufulira Wanderers, Kabwe Warriors), international clubs (Arsenal, Chelsea), national sides (Argentina, Portugal, England, France, Germany, Spain, Brazil, Zambia) and a growing retro archive of 90s classics.
          - paragraph [ref=e59]: "Our promise is simple: real jerseys, fair prices, no friction. You browse, you tap, you WhatsApp us. We confirm, you pay on delivery."
