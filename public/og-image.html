<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap");
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      background: linear-gradient(135deg, #FDF7F0 0%, #D8C3A5 50%, #5E6B3C 100%);
      font-family: "Inter", system-ui, sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      position: relative; overflow: hidden;
    }
    .badge {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      padding: 8px 24px; border-radius: 100px;
      font-size: 14px; font-weight: 700;
      color: #3F4A26; text-transform: uppercase;
      letter-spacing: 0.2em; border: 1px solid rgba(255,255,255,0.4);
    }
    .logo {
      width: 120px; height: 120px;
      background: #5E6B3C; border-radius: 32px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 56px; font-weight: 900;
      margin-bottom: 32px; box-shadow: 0 20px 60px rgba(94,107,60,0.3);
    }
    h1 {
      font-size: 72px; font-weight: 900;
      color: #2E2C2A; letter-spacing: -0.03em;
      text-align: center; line-height: 1.1;
    }
    h1 span { color: #5E6B3C; }
    .subtitle {
      font-size: 28px; font-weight: 400;
      color: #3F4A26; margin-top: 16px;
      text-align: center; max-width: 800px;
    }
    .cta {
      position: absolute; bottom: 50px;
      background: #25D366; color: white;
      padding: 16px 40px; border-radius: 100px;
      font-size: 20px; font-weight: 700;
      box-shadow: 0 10px 30px rgba(37,211,102,0.3);
      display: flex; align-items: center; gap: 12px;
    }
    .pattern {
      position: absolute; inset: 0; opacity: 0.06;
      background-image: radial-gradient(circle at 2px 2px, #3F4A26 1px, transparent 0);
      background-size: 40px 40px;
    }
    .accent-circle {
      position: absolute; width: 400px; height: 400px;
      border-radius: 50%; background: rgba(255,255,255,0.1);
      top: -100px; right: -100px;
    }
    .accent-circle-2 {
      position: absolute; width: 300px; height: 300px;
      border-radius: 50%; background: rgba(255,255,255,0.08);
      bottom: -80px; left: -80px;
    }
  </style>
</head>
<body>
  <div class="pattern"></div>
  <div class="accent-circle"></div>
  <div class="accent-circle-2"></div>
  <div class="badge">Kitwe, Zambia 🇿🇲</div>
  <div class="logo">K</div>
  <h1>Kopala <span>Kits</span></h1>
  <p class="subtitle">Premium Soccer Jerseys — Local, International &amp; Retro Classics</p>
  <div class="cta">
    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12c0 1.82.49 3.53 1.33 5.01L2 22l5.14-1.36C8.45 21.44 10.18 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm.93 14.26l-1.84.9c-.24.12-.54-.07-.5-.34l.25-2.05c-1.17-.39-2.4-1.16-3.23-2.42-.35-.52-.24-1.22.23-1.64.46-.4 1.12-.42 1.6-.06.41.3.7.76.82 1.25.12.48.04 1-.2 1.42-.1.18-.04.4.13.51.28.18.6.3.93.36.36.07.74.09 1.11.05.34-.04.67-.14.98-.29.42-.2.93-.17 1.31.1.35.26.52.69.42 1.1-.1.41-.43.75-.84.88-.4.13-.82.2-1.24.2z"/>
    </svg>
    Order via WhatsApp
  </div>
</body>
</html>
