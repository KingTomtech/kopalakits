<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" role="img" aria-label="MFC jersey">
  <defs>
    <clipPath id="shirtClip">
      <path d="M120 60 L160 40 Q200 30 240 40 L280 60 L340 90 L320 170 L290 160 L290 470 Q290 490 270 490 L130 490 Q110 490 110 470 L110 160 L80 170 L60 90 Z" />
    </clipPath>
    <linearGradient id="shade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(0,0,0,0)" />
      <stop offset="1" stop-color="rgba(0,0,0,0.18)" />
    </linearGradient>
  </defs>
  <rect width="400" height="520" fill="#F9F3E8" />
  
    <g clip-path="url(#shirtClip)">
      
        <rect x="-20" y="0" width="35" height="520" fill="#0a7a3b" />
      
        <rect x="50" y="0" width="35" height="520" fill="#ffffff" />
      
        <rect x="120" y="0" width="35" height="520" fill="#0a7a3b" />
      
        <rect x="190" y="0" width="35" height="520" fill="#ffffff" />
      
        <rect x="260" y="0" width="35" height="520" fill="#0a7a3b" />
      
        <rect x="330" y="0" width="35" height="520" fill="#ffffff" />
      
    </g>
  <path d="M120 60 L160 40 Q200 30 240 40 L280 60 L340 90 L320 170 L290 160 L290 470 Q290 490 270 490 L130 490 Q110 490 110 470 L110 160 L80 170 L60 90 Z"
        fill="url(#shade)" />
  <!-- collar -->
  <path d="M170 40 Q200 60 230 40 L230 60 Q200 80 170 60 Z" fill="rgba(0,0,0,0.18)" stroke="#ffffff" stroke-width="3" />
  <!-- sponsor patch -->
  <rect x="160" y="170" width="80" height="50" rx="6" fill="#ffffff" opacity="0.95" />
  <text x="200" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="22" fill="#0a7a3b">MFC</text>
  <!-- trim on sleeves -->
  <path d="M60 90 L110 110 L110 160 L80 170 Z" fill="#ffffff" opacity="0.6" />
  <path d="M340 90 L290 110 L290 160 L320 170 Z" fill="#ffffff" opacity="0.6" />
</svg>
