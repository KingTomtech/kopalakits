<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background Circle with Dusty Olive gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#71816d"/>
      <stop offset="100%" stop-color="#444e42"/>
    </linearGradient>
    <linearGradient id="jerseyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9f3e8"/>
      <stop offset="100%" stop-color="#f1e0c5"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGradient)"/>

  <!-- Jersey Icon -->
  <g filter="url(#shadow)" transform="translate(12, 10) scale(0.625)">
    <!-- Jersey Body -->
    <path
      d="M32 8 L16 16 L8 16 L8 36 L16 40 L16 60 L48 60 L48 40 L56 36 L56 16 L48 16 L32 8"
      fill="url(#jerseyGradient)"
      stroke="#f9f3e8"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <!-- Collar -->
    <path d="M30 8 L32 12 L34 8" fill="none" stroke="#f9f3e8" stroke-width="2" stroke-linecap="round"/>
    <!-- Sleeve accents -->
    <path d="M8 20 L16 22" stroke="#71816d" stroke-width="2" stroke-linecap="round"/>
    <path d="M56 20 L48 22" stroke="#71816d" stroke-width="2" stroke-linecap="round"/>
    <!-- Center stripe -->
    <rect x="30" y="20" width="4" height="35" fill="#71816d" opacity="0.6"/>
  </g>

  <!-- KK Letters (Kopala Kits) -->
  <text x="32" y="58" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f9f3e8" text-anchor="middle" letter-spacing="1">KK</text>
</svg>
